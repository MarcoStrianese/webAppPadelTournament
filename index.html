<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Tournament Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">Torneo Padel 2025</h1>
        <button id="btn-admin" onclick="toggleAdmin()" class="bg-blue-800 text-[10px] px-3 py-1 rounded uppercase font-bold">Admin Login</button>
    </header>

    <nav class="bg-white shadow-sm flex justify-around text-sm font-semibold uppercase text-gray-600 sticky top-[60px] z-10">
        <button onclick="openTab('gironi')" id="tab-gironi" class="p-4 flex-1 active-tab">Gironi</button>
        <button onclick="openTab('turni')" id="tab-turni" class="p-4 flex-1">Turni</button>
        <button onclick="openTab('classifica')" id="tab-classifica" class="p-4 flex-1">Classifica</button>
        <button onclick="openTab('finali')" id="tab-finali" class="p-4 flex-1">Finali</button>
    </nav>

    <main class="p-4 pb-20">
        <section id="gironi" class="tab-content active">
            <h2 class="text-lg font-bold mb-4">Gironi Iniziali</h2>
            <div id="gironi-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500 italic">Caricamento gironi...</p>
            </div>
        </section>

        <section id="turni" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Programma Partite</h2>
                <button id="btn-reset" onclick="resetTorneo()" class="hidden bg-red-500 text-white text-[10px] px-2 py-1 rounded shadow-sm hover:bg-red-600 uppercase font-bold">Reset Punteggi</button>
            </div>
            <div id="partite-container" class="space-y-6">
                <p class="text-gray-500 italic">Caricamento turni...</p>
            </div>
        </section>

        <section id="classifica" class="tab-content"></section>

        <section id="finali" class="tab-content">
            <h2 class="text-lg font-bold mb-4">Fase Finale</h2>
            <div id="finali-container" class="space-y-4">
                </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUvYvcMI5ZekMUdvXDLHTEi516UTp4_fA",
            authDomain: "torneopadel-aa0db.firebaseapp.com",
            projectId: "torneopadel-aa0db",
            storageBucket: "torneopadel-aa0db.firebasestorage.app",
            messagingSenderId: "1060755239762",
            appId: "1:1060755239762:web:086973b19fed398332008b",
            measurementId: "G-NJJ9MG0FFT"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let isAdmin = false;
        const ADMIN_PASSWORD = "indio";
        let classificaGlobale = { A: [], B: [] };

        function toggleAdmin() {
            if (!isAdmin) {
                const pass = prompt("Inserisci la password amministratore:");
                if (pass === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('btn-admin').innerText = "Logout Admin";
                    document.getElementById('btn-admin').classList.replace('bg-blue-800', 'bg-green-600');
                    document.getElementById('btn-reset').classList.remove('hidden');
                } else { alert("Password errata!"); }
            } else {
                isAdmin = false;
                document.getElementById('btn-admin').innerText = "Admin Login";
                document.getElementById('btn-admin').classList.replace('bg-green-600', 'bg-blue-800');
                document.getElementById('btn-reset').classList.add('hidden');
            }
            ascoltaPartite();
        }

        async function resetTorneo() {
            if (!confirm("Sei sicuro? Tutti i punteggi verranno azzerati!")) return;
            const snapshot = await db.collection("partite").get();
            const batch = db.batch();
            snapshot.forEach(doc => { batch.update(doc.ref, { scoreA: 0, scoreB: 0, conclusa: false }); });
            await batch.commit();
            alert("Torneo resettato!");
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
        }

        function ascoltaSquadre() {
            db.collection("squadre").onSnapshot((snapshot) => {
                const contenitoreGironi = document.getElementById("gironi-container");
                let htmlA = '<div class="bg-white p-4 rounded-lg shadow"><h3 class="font-bold border-b pb-2 mb-2 text-blue-600">Girone A</h3><ul>';
                let htmlB = '<div class="bg-white p-4 rounded-lg shadow"><h3 class="font-bold border-b pb-2 mb-2 text-green-600">Girone B</h3><ul>';
                snapshot.forEach((doc) => {
                    const s = doc.data();
                    const riga = `<li class="py-1 border-b text-sm">${s.nome}</li>`;
                    if (s.girone === "A") htmlA += riga; else htmlB += riga;
                });
                contenitoreGironi.innerHTML = htmlA + '</ul></div>' + htmlB + '</ul></div>';
                calcolaClassificaDallePartite();
            });
        }

        function ascoltaPartite() {
            const orariTurni = { 1: "15:00-15:30", 2: "15:30-16:00", 3: "16:00-16:30", 4: "16:30-17:00", 5: "17:00-17:30", 6: "17:30-18:00" };
            db.collection("partite").orderBy("turno").onSnapshot((snapshot) => {
                const container = document.getElementById("partite-container");
                container.innerHTML = ""; 
                let turniRaggruppati = {};
                snapshot.forEach(doc => {
                    const p = doc.data();
                    if (!turniRaggruppati[p.turno]) turniRaggruppati[p.turno] = [];
                    turniRaggruppati[p.turno].push({id: doc.id, ...p});
                });

                Object.keys(turniRaggruppati).sort((a, b) => a - b).forEach(turno => {
                    const infoRiposo = turniRaggruppati[turno].find(p => p.riposo)?.riposo || "";
                    let htmlTurno = `<div class="mb-8">
                        <div class="flex items-center space-x-2 mb-3">
                            <span class="bg-gray-800 text-white px-3 py-1 rounded-md text-xs font-bold uppercase">Turno ${turno}</span>
                            <span class="text-gray-500 text-sm font-semibold italic">${orariTurni[turno] || ""}</span>
                        </div><div class="space-y-3">`;

                    turniRaggruppati[turno].sort((a,b) => a.campo - b.campo).forEach(p => {
                        const inputA = isAdmin ? `<input type="number" value="${p.scoreA}" onchange="salvaPunteggio('${p.id}', 'A', this.value)" class="w-10 border rounded text-center p-1 bg-blue-50 font-bold">` : `<span class="w-10 text-center font-bold text-lg">${p.scoreA}</span>`;
                        const inputB = isAdmin ? `<input type="number" value="${p.scoreB}" onchange="salvaPunteggio('${p.id}', 'B', this.value)" class="w-10 border rounded text-center p-1 bg-blue-50 font-bold">` : `<span class="w-10 text-center font-bold text-lg">${p.scoreB}</span>`;

                        htmlTurno += `<div class="bg-white p-3 rounded-lg shadow-sm border flex justify-between items-center">
                            <div class="text-[10px] font-bold text-blue-500 uppercase w-10 border-r pr-2">C. ${p.campo}</div>
                            <div class="flex-grow flex items-center justify-around text-sm font-medium">
                                <span class="w-24 text-right truncate font-bold text-gray-700">${p.teamA}</span>
                                <div class="flex items-center space-x-2 mx-1">${inputA} <span class="text-gray-400">:</span> ${inputB}</div>
                                <span class="w-24 text-left truncate font-bold text-gray-700">${p.teamB}</span>
                            </div>
                        </div>`;
                    });
                    if (infoRiposo) {
                        htmlTurno += `<div class="bg-amber-50 p-2 rounded-md border border-dashed border-amber-200 mt-2 text-center">
                            <p class="text-[10px] text-amber-700 uppercase font-bold italic">☕ Riposano: ${infoRiposo}</p>
                        </div>`;
                    }
                    container.innerHTML += htmlTurno + `</div></div>`;
                });
                calcolaClassificaDallePartite();
            });
        }

        function salvaPunteggio(id, team, valore) {
            const up = {};
            up[`score${team}`] = parseInt(valore) || 0;
            up.conclusa = true;
            db.collection("partite").doc(id).update(up);
        }

        async function calcolaClassificaDallePartite() {
            const squadreSnap = await db.collection("squadre").get();
            const partiteSnap = await db.collection("partite").where("conclusa", "==", true).get();
            let squadreArr = [];
            squadreSnap.forEach(doc => {
                squadreArr.push({ nome: doc.data().nome, girone: doc.data().girone, punti: 0, fatti: 0, subiti: 0 });
            });
            let partiteConcluse = [];
            partiteSnap.forEach(doc => partiteConcluse.push(doc.data()));
            
            partiteConcluse.forEach(p => {
                let sA = squadreArr.find(s => s.nome === p.teamA);
                let sB = squadreArr.find(s => s.nome === p.teamB);
                if (sA && sB) {
                    sA.fatti += p.scoreA; sA.subiti += p.scoreB;
                    sB.fatti += p.scoreB; sB.subiti += p.scoreA;
                    if (p.scoreA > p.scoreB) sA.punti += 3;
                    else if (p.scoreB > p.scoreA) sB.punti += 3;
                    else { sA.punti += 1; sB.punti += 1; }
                }
            });

            const funzioneOrdinamento = (a, b) => {
                if (b.punti !== a.punti) return b.punti - a.punti;
                const scontro = partiteConcluse.find(p => (p.teamA === a.nome && p.teamB === b.nome) || (p.teamA === b.nome && p.teamB === a.nome));
                if (scontro) {
                    const pA = (scontro.teamA === a.nome) ? scontro.scoreA : scontro.scoreB;
                    const pB = (scontro.teamA === b.nome) ? scontro.scoreA : scontro.scoreB;
                    if (pA !== pB) return pB - pA;
                }
                if ((b.fatti - b.subiti) !== (a.fatti - a.subiti)) return (b.fatti - b.subiti) - (a.fatti - a.subiti);
                return b.fatti - a.fatti;
            };

            classificaGlobale.A = squadreArr.filter(s => s.girone === "A").sort(funzioneOrdinamento);
            classificaGlobale.B = squadreArr.filter(s => s.girone === "B").sort(funzioneOrdinamento);

            let htmlClassifica = '<h2 class="text-lg font-bold mb-4">Classifica Live</h2>';
            ["A", "B"].forEach(g => {
                const filtrate = classificaGlobale[g];
                htmlClassifica += `<div class="mb-8"><h3 class="font-bold text-gray-700 mb-2 px-2 uppercase text-sm">Girone ${g}</h3><div class="bg-white rounded-lg shadow overflow-hidden"><table class="w-full text-left border-collapse"><thead class="bg-gray-100 border-b text-[10px] uppercase text-gray-500 font-bold"><tr><th class="p-3">Team</th><th class="p-3 text-center">PT</th><th class="p-3 text-center">+/-</th><th class="p-3 text-center">GV</th><th class="p-3 text-center">GP</th></tr></thead><tbody class="text-sm">${filtrate.map(s => `<tr class="border-b"><td class="p-3 font-semibold text-gray-700">${s.nome}</td><td class="p-3 text-center font-bold text-blue-600">${s.punti}</td><td class="p-3 text-center font-medium ${s.fatti-s.subiti >=0 ? 'text-green-600':'text-red-600'}">${s.fatti-s.subiti}</td><td class="p-3 text-center text-gray-400">${s.fatti}</td><td class="p-3 text-center text-gray-400">${s.subiti}</td></tr>`).join("")}</tbody></table></div></div>`;
            });
            document.getElementById("classifica").innerHTML = htmlClassifica;
            renderFinali();
        }

        function renderFinali() {
            const container = document.getElementById("finali-container");
            const getT = (g, pos) => classificaGlobale[g][pos] ? classificaGlobale[g][pos].nome : `${pos + 1}° Gir. ${g}`;

            const f = [
                { t: "Finalissima 1°/2° Posto", a: getT('A', 0), b: getT('B', 0), c: "border-yellow-500" },
                { t: "Finale 3°/4° Posto", a: getT('A', 1), b: getT('B', 1), c: "border-gray-400" },
                { t: "Finale 5°/6° Posto", a: getT('A', 2), b: getT('B', 2), c: "border-amber-700" },
                { t: "Finale 7°/8° Posto", a: getT('A', 3), b: getT('B', 3), c: "border-blue-300" }
            ];

            container.innerHTML = f.map(m => `
                <div class="bg-white p-4 rounded-lg shadow border-l-4 ${m.c}">
                    <h3 class="text-[10px] font-bold uppercase text-gray-400 mb-2">${m.t}</h3>
                    <div class="flex justify-between items-center font-bold text-gray-800">
                        <span class="w-5/12">${m.a}</span>
                        <span class="w-2/12 text-center text-gray-300 text-xs">VS</span>
                        <span class="w-5/12 text-right">${m.b}</span>
                    </div>
                </div>`).join("");
        }

        ascoltaSquadre();
        ascoltaPartite();
    </script>
</body>
</html>
