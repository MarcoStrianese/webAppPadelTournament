<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Padel WebApp - Giocatori</title>
</head>
<body>

  <h1>Lista Giocatori</h1>
  <ul id="lista"></ul>
  <div id="error" style="color:red;"></div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    // --- Configura la connessione ---
    const supabaseUrl = "https://vdeqyvgrjifddbcnflta.supabase.co";
    const supabaseKey = "sb_publishable_BnbFTcYBlRG4NKR0aXhg-g_akKfk9kd";

    const clientSupabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function caricaGiocatori() {
      const { data, error } = await clientSupabase
        .from("giocatore") // attenzione alla maiuscola
        .select("*");

      const lista = document.getElementById("lista");
      const divErrore = document.getElementById("error");

      if (error) {
        console.error("Errore lettura giocatori:", error);
        divErrore.textContent = "Errore: " + JSON.stringify(error);
        return;
      }

      lista.innerHTML = ""; // pulisce lista
      data.forEach(g => {
        const li = document.createElement("li");
        li.textContent = g.nome + " - livello " + g.livello;
        lista.appendChild(li);
      });
    }

    caricaGiocatori();
  </script>

</body>
</html>
